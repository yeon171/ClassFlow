<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 및 예약 관리</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>회원 및 예약 관리 시스템</h1>

        <section class="form-section">
            <h2>회원 가입</h2>
            <form id="registrationForm">
                <label for="regName">이름:</label>
                <input type="text" id="regName" required>

                <label for="regEmail">이메일:</label>
                <input type="email" id="regEmail" required>

                <label for="regPassword">비밀번호:</label>
                <input type="password" id="regPassword" required>

                <button type="submit">가입하기</button>
            </form>
            <div id="registrationResult" class="result"></div>
        </section>

        <section class="form-section">
            <h2>로그인</h2>
            <form id="loginForm">
                <label for="loginEmail">이메일:</label>
                <input type="email" id="loginEmail" required>

                <label for="loginPassword">비밀번호:</label>
                <input type="password" id="loginPassword" required>

                <button type="submit">로그인</button>
            </form>
            <div id="loginResult" class="result"></div>
        </section>

        <section class="form-section">
            <h2>회원 조회 (ID)</h2>
            <form id="lookupIdForm">
                <label for="lookupId">회원 ID:</label>
                <input type="number" id="lookupId" required>
                <button type="submit">ID로 조회</button>
            </form>
            <div id="lookupIdResult" class="result"></div>
        </section>

        <section class="form-section">
            <h2>회원 조회 (이메일)</h2>
            <form id="lookupEmailForm">
                <label for="lookupEmail">이메일:</label>
                <input type="email" id="lookupEmail" required>
                <button type="submit">이메일로 조회</button>
            </form>
            <div id="lookupEmailResult" class="result"></div>
        </section>

        <section class="form-section">
            <h2>예약 생성</h2>
            <form id="createReservationForm">
                <label for="resMemberId">회원 ID:</label>
                <input type="number" id="resMemberId" required>

                <label for="resDateTime">예약 시간:</label>
                <input type="datetime-local" id="resDateTime" required>

                <button type="submit">예약 생성</button>
            </form>
            <div id="createReservationResult" class="result"></div>
        </section>

        <section class="form-section">
            <h2>회원별 예약 목록 조회</h2>
            <form id="listReservationsForm">
                <label for="listResMemberId">회원 ID:</label>
                <input type="number" id="listResMemberId" required>
                <button type="submit">예약 목록 조회</button>
            </form>
            <div id="listReservationsResult" class="result"></div>
        </section>

        <section class="form-section">
            <h2>예약 취소</h2>
            <form id="cancelReservationForm">
                <label for="cancelResId">예약 ID:</label>
                <input type="number" id="cancelResId" required>
                <button type="submit">예약 취소</button>
            </form>
            <div id="cancelReservationResult" class="result"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
