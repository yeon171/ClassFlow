<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 CRUD 테스트</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #studentForm { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        #studentForm input, #studentForm textarea { display: block; width: 300px; margin-bottom: 10px; padding: 8px; }
        #studentForm button { padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #studentList { border-collapse: collapse; width: 100%; }
        #studentList th, #studentList td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        #studentList th { background-color: #f2f2f2; }
        .action-buttons button { margin-right: 5px; }
    </style>
</head>
<body>
    <h1>학생 관리</h1>

    <h2>새 학생 추가</h2>
    <div id="studentForm">
        <input type="text" id="name" placeholder="이름" required>
        <input type="text" id="phone" placeholder="연락처" required>
        <textarea id="memo" placeholder="특이사항, 목표, 수업 메모"></textarea>
        <button onclick="createStudent()">학생 추가</button>
    </div>

    <h2>학생 목록</h2>
    <table id="studentList">
        <thead>
            <tr>
                <th>ID</th>
                <th>이름</th>
                <th>연락처</th>
                <th>메모</th>
                <th>작업</th>
            </tr>
        </thead>
        <tbody>
            <!-- 학생 목록이 여기에 로드됩니다 -->
        </tbody>
    </table>

    <script>
        const API_BASE_URL = '/api/students';

        async function fetchStudents() {
            try {
                const response = await fetch(API_BASE_URL);
                const students = await response.json();
                const studentListBody = document.querySelector('#studentList tbody');
                studentListBody.innerHTML = ''; // 기존 목록 지우기

                students.forEach(student => {
                    const row = studentListBody.insertRow();
                    row.insertCell().textContent = student.id;
                    row.insertCell().textContent = student.name;
                    row.insertCell().textContent = student.phone;
                    row.insertCell().textContent = student.memo;

                    const actionsCell = row.insertCell();
                    const editButton = document.createElement('button');
                    editButton.textContent = '수정';
                    editButton.onclick = () => editStudent(student);
                    actionsCell.appendChild(editButton);

                    const deleteButton = document.createElement('button');
                    deleteButton.textContent = '삭제';
                    deleteButton.onclick = () => deleteStudent(student.id);
                    actionsCell.appendChild(deleteButton);
                });
            } catch (error) {
                console.error('학생 목록을 가져오는 중 오류 발생:', error);
            }
        }

        async function createStudent() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const memo = document.getElementById('memo').value;

            if (!name || !phone) {
                alert('이름과 연락처는 필수 입력 항목입니다!');
                return;
            }

            try {
                const response = await fetch(API_BASE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, phone, memo })
                });
                if (response.ok) {
                    alert('학생이 성공적으로 생성되었습니다!');
                    document.getElementById('name').value = '';
                    document.getElementById('phone').value = '';
                    document.getElementById('memo').value = '';
                    fetchStudents(); // 목록 새로고침
                } else {
                    alert('학생 생성에 실패했습니다.');
                }
            } catch (error) {
                console.error('학생 생성 중 오류 발생:', error);
            }
        }

        async function updateStudent(id, updatedData) {
            try {
                const response = await fetch(`${API_BASE_URL}/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(updatedData)
                });
                if (response.ok) {
                    alert('학생이 성공적으로 업데이트되었습니다!');
                    fetchStudents();
                } else {
                    alert('학생 업데이트에 실패했습니다.');
                }
            } catch (error) {
                console.error('학생 업데이트 중 오류 발생:', error);
            }
        }

        async function deleteStudent(id) {
            if (!confirm('정말로 이 학생을 삭제하시겠습니까?')) {
                return;
            }
            try {
                const response = await fetch(`${API_BASE_URL}/${id}`, {
                    method: 'DELETE'
                });
                if (response.ok) {
                    alert('학생이 성공적으로 삭제되었습니다!');
                    fetchStudents(); // 목록 새로고침
                } else {
                    alert('학생 삭제에 실패했습니다.');
                }
            } catch (error) {
                console.error('학생 삭제 중 오류 발생:', error);
            }
        }

        function editStudent(student) {
            const newName = prompt('새 이름을 입력하세요:', student.name);
            if (newName === null) return; // 사용자가 취소함

            const newPhone = prompt('새 연락처를 입력하세요:', student.phone);
            if (newPhone === null) return;

            const newMemo = prompt('새 메모를 입력하세요:', student.memo);
            if (newMemo === null) return;

            updateStudent(student.id, { name: newName, phone: newPhone, memo: newMemo });
        }

        // 페이지 로드 시 학생 목록 불러오기
        window.onload = fetchStudents;
    </script>
</body>
</html>
